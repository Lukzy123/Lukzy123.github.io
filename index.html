<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Te Amo</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      font-family: 'monospace';
      color: #ff69b4;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
    }
    .contenedor {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 1;
      width: 80%;
    }
    .corazon {
      font-size: 48px;
      margin-bottom: 20px;
      animation: latido 1s infinite;
    }
    @keyframes latido {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }
    .texto-romantico {
      white-space: pre-line;
      font-size: 1.2rem;
      color: #ff69b4;
    }
    .boton {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 2;
      background: #ff69b4;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 1rem;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <button class="boton" onclick="iniciar()">Iniciar</button>
  <div class="contenedor">
    <div class="corazon">❤️</div>
    <p id="texto" class="texto-romantico"></p>
  </div>
  <audio id="musica" src="https://lukzy123.github.io/cancion.mp3" loop></audio>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let fontSize = 18;
    let columns = Math.floor(canvas.width / fontSize);
    let drops = Array(columns).fill(1);
    let teAmo = "Te Amo";
    let explosionParticles = [];

    function drawMatrix() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ff69b4";
      ctx.font = fontSize + "px monospace";
      for (let i = 0; i < drops.length; i++) {
        let char = teAmo.charAt(Math.floor(Math.random() * teAmo.length));
        ctx.fillText(char, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height || Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
      updateExplosions();
    }

    function createExplosion(x, y) {
      for (let i = 0; i < 30; i++) {
        explosionParticles.push({
          x: x,
          y: y,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6,
          alpha: 1,
          text: teAmo
        });
      }
    }

    function updateExplosions() {
      for (let i = explosionParticles.length - 1; i >= 0; i--) {
        let p = explosionParticles[i];
        ctx.fillStyle = `rgba(255, 105, 180, ${p.alpha})`;
        ctx.font = "16px monospace";
        ctx.fillText(p.text, p.x, p.y);
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.02;
        if (p.alpha <= 0) {
          explosionParticles.splice(i, 1);
        }
      }
    }

    canvas.addEventListener("click", (e) => {
      createExplosion(e.clientX, e.clientY);
    });

    function animate() {
      drawMatrix();
      requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      columns = Math.floor(canvas.width / fontSize);
      drops = Array(columns).fill(1);
    });

    const letraCompleta = `... (letra de la canción completa aquí) ...`;

    const textoElemento = document.getElementById("texto");
    let lineas = letraCompleta.split("\n");
    let indexLinea = 0;
    let lineasMostradas = 0;

    function escribirLinea() {
      if (indexLinea < lineas.length) {
        if (lineasMostradas >= 10) {
          textoElemento.textContent = "";
          lineasMostradas = 0;
        }
        textoElemento.textContent += lineas[indexLinea] + "\n";
        indexLinea++;
        lineasMostradas++;
        setTimeout(escribirLinea, 1500); // AHORA MUY LENTO, IDEAL PARA LEER
      }
    }

    function iniciar() {
      const audio = document.getElementById("musica");
      audio.playbackRate = 0.9;
      audio.play();
      document.querySelector(".boton").style.display = "none";
      setTimeout(() => {
        escribirLinea();
      }, 35000); // ESPERA DE 35 SEGUNDOS PARA QUE SUENE LA MELODÍA PRIMERO
    }
  </script>
</body>
</html>
