<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Te Amo</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      font-family: monospace;
      color: #ff69b4;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
      z-index: 0;
    }

    .contenedor {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 1;
      width: 80%;
    }

    .corazon {
      font-size: 48px;
      margin-bottom: 20px;
      animation: latido 1s infinite;
    }

    @keyframes latido {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    .texto-romantico {
      white-space: pre-line;
      font-size: 1.2rem;
      color: #ff69b4;
      min-height: 200px;
    }

    #playBtn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1rem;
      background-color: #ff69b4;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      z-index: 2;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="contenedor">
  <div class="corazon">❤️</div>
  <p id="texto" class="texto-romantico"></p>
  <button id="playBtn">🎵 Reproducir música</button>
</div>

<audio id="audio" loop>
  <source src="https://docs.google.com/uc?export=download&id=1sXq8BycjT5W_ybmdOr8sFb1CcekouSvx" type="audio/mpeg">
  Tu navegador no soporta el audio.
</audio>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let fontSize = 18;
let columns = Math.floor(canvas.width / fontSize);
let drops = Array(columns).fill(1);
let teAmo = "Te Amo";
let explosionParticles = [];

function drawMatrix() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#ff69b4";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let char = teAmo.charAt(Math.floor(Math.random() * teAmo.length));
    ctx.fillText(char, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height || Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }

  updateExplosions();
}

function createExplosion(x, y) {
  for (let i = 0; i < 30; i++) {
    explosionParticles.push({
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      alpha: 1,
      text: teAmo
    });
  }
}

function updateExplosions() {
  for (let i = explosionParticles.length - 1; i >= 0; i--) {
    let p = explosionParticles[i];
    ctx.fillStyle = `rgba(255, 105, 180, ${p.alpha})`;
    ctx.font = "16px monospace";
    ctx.fillText(p.text, p.x, p.y);
    p.x += p.vx;
    p.y += p.vy;
    p.alpha -= 0.02;

    if (p.alpha <= 0) {
      explosionParticles.splice(i, 1);
    }
  }
}

canvas.addEventListener("click", (e) => {
  createExplosion(e.clientX, e.clientY);
});

function animate() {
  drawMatrix();
  requestAnimationFrame(animate);
}
animate();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  columns = Math.floor(canvas.width / fontSize);
  drops = Array(columns).fill(1);
});

// --------- TEXTO ROMÁNTICO QUE SE ESCRIBE LETRA POR LETRA ---------
const letraCompleta = `
(Tu y yo)...
Si tú sabes que te quiero,
que sin ti mi amor me muero.
Nunca dudes que te extraño, nunca dudes que te amo,
como pienso en tu sonrisa,
cuando me besa la brisa y el dorado de tu pelo...
se me enreda entre mi cuerpo,
cuando tú me amas siento que enloquecen mis sentidos,
nada existe, nada vale, solo escucho tus gemiiiidoooos.

Gloria si tú sabes que te quiero,
que sin ti mi amor me muero.
Nunca dudes que te amo,
nunca dudes que te extraaañooo...
que te aaaamoo...

(Tu y yo)...
A pesar de estar ausente, en mi mente estás presente,
y no importa la distancia, que a nosotros los amantes
siento ansias del regreso, siento ansias de besarte,
y en mis brazos amarrarte...
y gritarte que eres miiiaaa...

Gloria si tú sabes que te quiero,
que sin ti mi amor me muero.
Nunca dudes que te amo,
nunca dudes que te extraaañooo...
que te aaaamoo...
`;

const elemento = document.getElementById("texto");
let i = 0;
let buffer = "";

function escribirLetra() {
  if (i < letraCompleta.length) {
    buffer += letraCompleta.charAt(i);
    elemento.textContent = limitarLineas(buffer, 10);
    i++;
    setTimeout(escribirLetra, 90); // Velocidad lenta
  }
}

function limitarLineas(texto, maxLineas) {
  const lineas = texto.split("\n");
  if (lineas.length > maxLineas) {
    return lineas.slice(lineas.length - maxLineas).join("\n");
  }
  return texto;
}

escribirLetra();

// --------- BOTÓN PARA REPRODUCIR MÚSICA ---------
document.getElementById("playBtn").addEventListener("click", () => {
  const audio = document.getElementById("audio");
  audio.play().then(() => {
    document.getElementById("playBtn").style.display = "none";
  }).catch((e) => {
    alert("No se pudo reproducir automáticamente. Toca el botón de nuevo.");
  });
});
</script>

</body>
</html>
